{% extends "base.html" %}
{% block title %}Agregar cuenta IMAP - Email Agent{% endblock %}

{% block content %}
<div class="flex-1 overflow-y-auto custom-scrollbar">
    <div class="max-w-lg mx-auto p-8">
        <a href="{{ url_for('index') }}" class="inline-flex items-center gap-1 text-sm text-slate-400 hover:text-primary transition-colors no-underline mb-6">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            Volver
        </a>

        <div class="bg-slate-50 dark:bg-background-dark/50 rounded-xl border border-slate-200 dark:border-primary/10 overflow-hidden">
            <div class="flex items-center gap-2 px-5 py-3 border-b border-slate-200 dark:border-primary/10 text-sm font-semibold text-slate-200">
                <span class="material-symbols-outlined text-[18px] text-primary">mail</span>
                Agregar cuenta de correo (IMAP)
            </div>
            <div class="p-6">
                <form method="POST" action="{{ url_for('auth.imap_add') }}">
                    <div class="mb-4">
                        <label class="block text-[11px] font-bold text-slate-500 tracking-widest uppercase mb-1">Nombre de la cuenta</label>
                        <input type="text" name="name" placeholder="Ej: Mi Correo" required
                            class="w-full px-3 py-2 bg-black/20 border border-primary/10 rounded-lg text-sm text-slate-100 focus:ring-2 focus:ring-primary/30 focus:border-primary/40 transition-all placeholder:text-slate-600">
                    </div>

                    <div class="border-t border-primary/10 my-5"></div>
                    <div class="text-[11px] font-bold text-slate-500 tracking-widest uppercase mb-3">Servidor de entrada (IMAP)</div>

                    <div class="grid grid-cols-3 gap-3 mb-3">
                        <div class="col-span-2">
                            <label class="block text-[11px] font-bold text-slate-500 tracking-widest uppercase mb-1">Host IMAP</label>
                            <input type="text" name="host" placeholder="imap.ejemplo.com" required
                                class="w-full px-3 py-2 bg-black/20 border border-primary/10 rounded-lg text-sm text-slate-100 focus:ring-2 focus:ring-primary/30 focus:border-primary/40 transition-all placeholder:text-slate-600">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 tracking-widest uppercase mb-1">Puerto</label>
                            <input type="number" name="port" value="993"
                                class="w-full px-3 py-2 bg-black/20 border border-primary/10 rounded-lg text-sm text-slate-100 focus:ring-2 focus:ring-primary/30 focus:border-primary/40 transition-all">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="block text-[11px] font-bold text-slate-500 tracking-widest uppercase mb-1">Email</label>
                        <input type="email" name="email" placeholder="tu@ejemplo.com" required
                            class="w-full px-3 py-2 bg-black/20 border border-primary/10 rounded-lg text-sm text-slate-100 focus:ring-2 focus:ring-primary/30 focus:border-primary/40 transition-all placeholder:text-slate-600">
                    </div>
                    <div class="mb-4">
                        <label class="block text-[11px] font-bold text-slate-500 tracking-widest uppercase mb-1">Contrasena</label>
                        <input type="password" name="password" required
                            class="w-full px-3 py-2 bg-black/20 border border-primary/10 rounded-lg text-sm text-slate-100 focus:ring-2 focus:ring-primary/30 focus:border-primary/40 transition-all">
                    </div>

                    <div class="border-t border-primary/10 my-5"></div>
                    <div class="text-[11px] font-bold text-slate-500 tracking-widest uppercase mb-3">Servidor de salida (SMTP)</div>

                    <div class="grid grid-cols-3 gap-3 mb-6">
                        <div class="col-span-2">
                            <label class="block text-[11px] font-bold text-slate-500 tracking-widest uppercase mb-1">Host SMTP</label>
                            <input type="text" name="smtp_host" placeholder="smtp.ejemplo.com (opcional)"
                                class="w-full px-3 py-2 bg-black/20 border border-primary/10 rounded-lg text-sm text-slate-100 focus:ring-2 focus:ring-primary/30 focus:border-primary/40 transition-all placeholder:text-slate-600">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 tracking-widest uppercase mb-1">Puerto</label>
                            <input type="number" name="smtp_port" value="587"
                                class="w-full px-3 py-2 bg-black/20 border border-primary/10 rounded-lg text-sm text-slate-100 focus:ring-2 focus:ring-primary/30 focus:border-primary/40 transition-all">
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full py-3 bg-primary hover:bg-primary/90 text-white rounded-xl font-bold text-sm transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">power</span>
                        Conectar cuenta
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
