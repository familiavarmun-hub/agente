<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - Email Agent</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6c2bee",
                        "background-dark": "#161022",
                    },
                },
            },
        }
    </script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-background-dark text-slate-100 antialiased min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="bg-primary p-3 rounded-2xl inline-flex items-center justify-center mb-4 shadow-lg shadow-primary/30">
                <span class="material-symbols-outlined text-white text-[32px]">mail</span>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Email Agent</h1>
            <p class="text-sm text-slate-500 mt-1">Ingresa tu contraseña para acceder</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="mb-4 px-4 py-3 rounded-xl text-sm
                {% if category == 'error' %}bg-red-500/10 text-red-400 border border-red-500/20
                {% else %}bg-primary/10 text-primary border border-primary/20{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="/login" class="space-y-4">
            <div>
                <input type="password" name="password" required autofocus placeholder="Contraseña"
                    class="w-full px-4 py-3 bg-black/30 border border-primary/15 rounded-xl text-sm text-slate-100 focus:ring-2 focus:ring-primary/40 focus:border-primary/40 transition-all placeholder:text-slate-600">
            </div>
            <button type="submit"
                class="w-full py-3 bg-primary hover:bg-primary/90 text-white rounded-xl font-bold text-sm transition-all shadow-lg shadow-primary/25 flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-[18px]">lock_open</span>
                Entrar
            </button>
        </form>
    </div>
</body>
</html>
